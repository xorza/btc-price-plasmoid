name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update metadata version
        run: |
          cd plasmoid
          jq --arg v "${{ steps.version.outputs.version }}" '.KPlugin.Version = $v' metadata.json > metadata.tmp && mv metadata.tmp metadata.json

      - name: Package plasmoid
        run: |
          cd plasmoid
          zip -r "../btc-price-${{ steps.version.outputs.version }}.plasmoid" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: btc-price-${{ steps.version.outputs.version }}.plasmoid
